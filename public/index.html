<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bale Checker</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Bale Checker</a>
      <nav class="nav">
        <a href="/admin">Группы</a>
        <a class="button small" href="/admin/new">Новая группа</a>
      </nav>
    </header>

    <main class="shell">
      <section class="hero">
        <div>
          <p class="eyebrow">Учет тюков</p>
          <h1>Группы тюков с публичными QR-страницами</h1>
          <p class="lead">
            Создавайте группы, храните даты покоса и зарулонивания, влажность,
            культуру, поле и количество тюков. QR ведет на публичную карточку группы.
          </p>
          <div class="actions">
            <a class="button" href="/admin/new">Создать группу</a>
            <a class="button secondary" href="/admin">Открыть список</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
